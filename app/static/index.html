<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubble Tracker</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #1a2433;
        --muted: #576273;
        --accent: #0b6bcb;
        --danger: #c73030;
        --ok: #1d8f4f;
      }
      body {
        margin: 0;
        background: radial-gradient(circle at top right, #dbe8ff, #f5f7fb 40%);
        color: var(--text);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }
      .wrap {
        max-width: 1100px;
        margin: 24px auto;
        padding: 0 16px;
      }
      h1 {
        margin: 0 0 8px;
      }
      .sub {
        color: var(--muted);
        margin-bottom: 16px;
      }
      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .card {
        background: var(--card);
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(24, 39, 75, 0.1);
        padding: 14px;
      }
      .value {
        font-size: 1.6rem;
        font-weight: 700;
      }
      .meta {
        color: var(--muted);
        font-size: 0.9rem;
        margin-top: 4px;
      }
      .desc {
        color: var(--muted);
        font-size: 0.82rem;
        margin-top: 6px;
        line-height: 1.4;
      }
      .ok {
        color: var(--ok);
      }
      .bad {
        color: var(--danger);
      }
      .line {
        height: 100px;
        width: 100%;
        margin-top: 8px;
        position: relative;
      }
      canvas {
        max-height: 100px;
      }
      .footer {
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Bubble Tracker</h1>
      <div class="sub">Live snapshot from Postgres. Auto-refresh every 30 seconds.</div>
      <div id="status" class="sub">Loading...</div>
      <div class="grid" id="cards"></div>
      <div class="footer">API: <code>/latest</code> and <code>/metrics/{metric}</code></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
      const cards = document.getElementById("cards");
      const status = document.getElementById("status");
      let chartInstances = {};

      async function fetchSeries(metric, field) {
        const r = await fetch(`/metrics/${metric}`);
        if (!r.ok) return { dates: [], values: [] };
        const rows = await r.json();
        const last30 = rows.slice(-30);
        return {
          dates: last30.map(x => x.date),
          values: last30.map((x) => { const v = Number(x[field]); return Number.isNaN(v) ? null : v; })
        };
      }

      function createChart(canvasId, data, label, color = '#0b6bcb') {
        const ctx = document.getElementById(canvasId);
        if (!ctx) return;
        
        // Destroy existing chart
        if (chartInstances[canvasId]) {
          chartInstances[canvasId].destroy();
        }

        if (!data.values.length) {
          ctx.parentElement.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">No historical data yet</div>';
          return;
        }

        chartInstances[canvasId] = new Chart(ctx, {
          type: 'line',
          data: {
            labels: data.dates,
            datasets: [{
              label: label,
              data: data.values,
              borderColor: color,
              backgroundColor: color + '20',
              tension: 0.3,
              fill: true,
              pointRadius: 2,
              pointHoverRadius: 4,
              spanGaps: false,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                mode: 'index',
                intersect: false,
              }
            },
            scales: {
              x: {
                display: false,
              },
              y: {
                display: true,
                grid: { color: '#f0f0f0' },
                ticks: { font: { size: 10 } }
              }
            },
            interaction: {
              mode: 'nearest',
              axis: 'x',
              intersect: false
            }
          }
        });
      }

      async function render() {
        try {
          const r = await fetch("/latest");
          if (!r.ok) throw new Error("API unavailable");
          const data = await r.json();

          const deviationSeries = await fetchSeries("deviation", "deviation_pct");
          const sentimentSeries = await fetchSeries("sentiment", "fear_greed_score");
          const liquiditySeries = await fetchSeries("liquidity", "rrp_billions");
          const ipoSeries = await fetchSeries("ipo_heat", "vol_heat_ratio");
          const valuationSeries = await fetchSeries("valuation", "spy_pe_deviation_pct");
          const volatilitySeries = await fetchSeries("volatility", "vix_level");

          const items = [
            {
              title: "Nasdaq Deviation",
              value: data.deviation ? `${data.deviation.deviation_pct.toFixed(2)}%` : "No data",
              meta: data.deviation ? `Date: ${data.deviation.date}` : "Run worker once",
              desc: "NASDAQ-100 deviation from 200-day moving average. >15% signals overheating.",
              cls: data.deviation && data.deviation.deviation_pct > 15 ? "bad" : "ok",
              chartData: deviationSeries,
              chartColor: '#0b6bcb',
            },
            {
              title: "Fear & Greed",
              value: data.sentiment ? `${Math.round(data.sentiment.fear_greed_score)} / 100` : "No data",
              meta: data.sentiment ? `${data.sentiment.rating} (${data.sentiment.date})` : "CNN API blocked (418)",
              desc: "CNN Fear & Greed Index. <25 = extreme fear, >75 = extreme greed.",
              cls: "",
              chartData: sentimentSeries,
              chartColor: '#c73030',
            },
            {
              title: "Fed Liquidity",
              value: data.liquidity ? `RRP ${Math.round(data.liquidity.rrp_billions)}B` : "No data",
              meta: data.liquidity ? `TGA: ${Math.round(data.liquidity.tga_billions)}B` : "Run worker once",
              desc: "Reverse Repo + Treasury General Account. Low RRP = more liquidity flooding markets.",
              cls: "",
              chartData: liquiditySeries,
              chartColor: '#1d8f4f',
            },
            {
              title: "IPO Heat",
              value: data.ipo_heat ? `${data.ipo_heat.vol_heat_ratio.toFixed(2)}x` : "No data",
              meta: data.ipo_heat ? `Date: ${data.ipo_heat.date}` : "Run worker once",
              desc: "IPO ETF volume ratio vs 5-day average. >2x signals speculative frenzy.",
              cls: data.ipo_heat && data.ipo_heat.vol_heat_ratio > 2 ? "bad" : "ok",
              chartData: ipoSeries,
              chartColor: '#ff6b35',
            },
            {
              title: "Valuation (P/E)",
              value: data.valuation && data.valuation.spy_pe && data.valuation.qqq_pe 
                ? `SPY ${data.valuation.spy_pe.toFixed(1)} / QQQ ${data.valuation.qqq_pe.toFixed(1)}` 
                : "No data",
              meta: data.valuation && data.valuation.spy_pe_deviation_pct != null
                ? `${data.valuation.spy_pe_deviation_pct > 0 ? '+' : ''}${data.valuation.spy_pe_deviation_pct.toFixed(1)}% vs hist avg` 
                : "Run worker once",
              desc: "Price-to-earnings ratios. Historical S&P 500 average is ~16. High P/E = expensive.",
              cls: data.valuation && data.valuation.spy_pe_deviation_pct > 50 ? "bad" : "ok",
              chartData: valuationSeries,
              chartColor: '#9333ea',
            },
            {
              title: "VIX (Volatility)",
              value: data.volatility && data.volatility.vix_level != null 
                ? `${data.volatility.vix_level.toFixed(1)}` 
                : "No data",
              meta: data.volatility && data.volatility.vix_sma_20 != null
                ? `20-day avg: ${data.volatility.vix_sma_20.toFixed(1)}`
                : data.volatility 
                  ? `Date: ${data.volatility.date}` 
                  : "Run worker once",
              desc: "VIX fear index. <12 = complacency risk, >30 = panic/crash mode.",
              cls: data.volatility && data.volatility.vix_level < 12 ? "bad" : "ok",
              chartData: volatilitySeries,
              chartColor: '#ea580c',
            },
          ];

          cards.innerHTML = items
            .map(
              (x, i) => `
              <div class="card">
                <div>${x.title}</div>
                <div class="value ${x.cls}">${x.value}</div>
                <div class="meta">${x.meta}</div>
                ${x.desc ? `<div class="desc">${x.desc}</div>` : ''}
                <div class="line">
                  <canvas id="chart-${i}"></canvas>
                </div>
              </div>
            `,
            )
            .join("");

          // Create charts after DOM is ready
          items.forEach((item, i) => {
            createChart(`chart-${i}`, item.chartData, item.title, item.chartColor || '#0b6bcb');
          });

          status.textContent = `Last refresh: ${new Date().toLocaleString()}`;
        } catch (err) {
          status.textContent = `Error: ${err.message}`;
        }
      }

      render();
      setInterval(render, 30000);
    </script>
  </body>
</html>
