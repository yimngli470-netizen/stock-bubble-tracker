<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market Mood Tracker</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #1a2433;
        --muted: #576273;
        --accent: #0b6bcb;
        --danger: #c73030;
        --low-risk: #2563eb;
        --ok: #1d8f4f;
      }
      body {
        margin: 0;
        background: radial-gradient(circle at top right, #dbe8ff, #f5f7fb 40%);
        color: var(--text);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }
      .wrap {
        max-width: 1100px;
        margin: 24px auto;
        padding: 0 16px;
      }
      h1 {
        margin: 0 0 8px;
      }
      .sub {
        color: var(--muted);
        margin-bottom: 16px;
      }
      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .toolbar .sub {
        margin-bottom: 0;
      }
      .range-toggle {
        display: inline-flex;
        gap: 2px;
        padding: 3px;
        border: 1px solid #d7deea;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
      }
      .range-toggle button {
        min-width: 58px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font: inherit;
        font-size: 0.9rem;
        padding: 6px 10px;
      }
      .range-toggle button:hover {
        color: var(--text);
        background: #eef4ff;
      }
      .range-toggle button.active {
        color: #ffffff;
        background: var(--accent);
        box-shadow: 0 2px 8px rgba(11, 107, 203, 0.22);
      }
      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .card {
        background: var(--card);
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(24, 39, 75, 0.1);
        padding: 14px;
      }
      .value {
        font-size: 1.6rem;
        font-weight: 700;
      }
      .meta {
        color: var(--muted);
        font-size: 0.9rem;
        margin-top: 4px;
      }
      .desc {
        color: var(--muted);
        font-size: 0.82rem;
        margin-top: 6px;
        line-height: 1.4;
      }
      .ok {
        color: var(--ok);
      }
      .bad {
        color: var(--danger);
      }
      .line {
        height: 100px;
        width: 100%;
        margin-top: 8px;
        position: relative;
      }
      canvas {
        max-height: 100px;
      }
      .footer {
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.85rem;
      }
      .page-tabs {
        display: inline-flex;
        gap: 4px;
        padding: 4px;
        border: 1px solid #d7deea;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.8);
        margin-bottom: 18px;
      }
      .page-tabs button {
        border: 0;
        border-radius: 7px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font: inherit;
        font-size: 0.95rem;
        font-weight: 600;
        padding: 8px 18px;
      }
      .page-tabs button:hover {
        color: var(--text);
        background: #eef4ff;
      }
      .page-tabs button.active {
        color: #ffffff;
        background: var(--accent);
        box-shadow: 0 2px 8px rgba(11, 107, 203, 0.25);
      }
      .quad-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .quad {
        position: relative;
        width: var(--quad-size, 300px);
        height: var(--quad-size, 300px);
        display: grid;
        grid-template-columns: 60% 40%;
        grid-template-rows: 40% 60%;
        border: 1px solid #d7deea;
        border-radius: 8px;
        overflow: hidden;
        cursor: zoom-in;
        transition: box-shadow 0.18s ease;
      }
      .quad:hover {
        box-shadow: 0 6px 20px rgba(24, 39, 75, 0.16);
      }
      .quad-cell {
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: calc(var(--quad-size, 300px) * 0.032);
        line-height: 1.35;
        color: var(--muted);
        background: #f8fafd;
        border: 1px dashed #e2e8f2;
        padding: 4px;
      }
      .quad-expand {
        position: absolute;
        top: 6px;
        right: 6px;
        font-size: 0.7rem;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.85);
        border-radius: 5px;
        padding: 1px 6px;
        pointer-events: none;
      }
      .quad-cell.active {
        background: #fff3f0;
        color: var(--danger);
        font-weight: 700;
      }
      .quad-cell.active.calm {
        background: #eefaf2;
        color: var(--ok);
      }
      .quad-dot {
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--accent);
        border: 2px solid #ffffff;
        box-shadow: 0 0 0 4px rgba(11, 107, 203, 0.18);
        transform: translate(-50%, 50%);
        animation: quad-pulse 2.4s ease-in-out infinite;
      }
      .quad-modal {
        position: fixed;
        inset: 0;
        background: rgba(16, 24, 40, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 24px;
        cursor: zoom-out;
      }
      .quad-modal[hidden] {
        display: none;
      }
      .quad-modal .quad {
        --quad-size: min(82vw, 78vh, 620px);
        cursor: default;
        background: #ffffff;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }
      .quad-modal .quad-cell {
        font-size: 1.05rem;
      }
      .quad-modal .quad-axis {
        font-size: 1rem;
      }
      .quad-modal .quad-expand {
        display: none;
      }
      .quad-modal-close {
        position: absolute;
        top: 18px;
        right: 22px;
        color: #fff;
        font-size: 1.6rem;
        cursor: pointer;
        line-height: 1;
      }
      @keyframes quad-pulse {
        0%, 100% { box-shadow: 0 0 0 4px rgba(11, 107, 203, 0.18); }
        50% { box-shadow: 0 0 0 9px rgba(11, 107, 203, 0.07); }
      }
      .quad-axis {
        font-size: 0.7rem;
        color: var(--muted);
      }
      .quad-y {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
      }
      .quad-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .section-title {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        margin: 22px 2px 10px;
      }
      .section-title h2 {
        margin: 0;
        font-size: 1.02rem;
      }
      .section-title .sub {
        margin: 0;
        font-size: 0.82rem;
      }
      .card-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
      }
      .card-title {
        display: inline-flex;
        align-items: center;
      }
      .info-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 14px;
        height: 14px;
        margin-left: 6px;
        border-radius: 50%;
        border: 1px solid var(--muted);
        color: var(--muted);
        font-size: 0.62rem;
        font-style: normal;
        font-weight: 700;
        cursor: help;
        position: relative;
        flex: none;
      }
      .info-icon .tip {
        display: none;
        position: absolute;
        bottom: 150%;
        left: 50%;
        transform: translateX(-50%);
        width: 210px;
        background: #1a2433;
        color: #fff;
        font-size: 0.74rem;
        font-style: normal;
        font-weight: 400;
        line-height: 1.45;
        text-align: left;
        padding: 8px 10px;
        border-radius: 6px;
        box-shadow: 0 6px 18px rgba(24, 39, 75, 0.28);
        z-index: 30;
        white-space: normal;
      }
      .info-icon:hover .tip,
      .info-icon:focus .tip {
        display: block;
      }
      .chip {
        font-size: 0.7rem;
        color: var(--muted);
        background: #eef2f9;
        border-radius: 10px;
        padding: 2px 8px;
        white-space: nowrap;
      }
      .hero {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
        align-items: stretch;
      }
      .hero-left {
        min-width: 230px;
      }
      .hero-score {
        font-size: 3rem;
        font-weight: 800;
        line-height: 1.1;
      }
      .hero-status {
        font-weight: 700;
        margin-top: 2px;
      }
      .hero-episodes {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 3px;
        font-size: 0.8rem;
        color: var(--muted);
      }
      .hero-episodes .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
      }
      .hero-mid {
        min-width: 300px;
        border-left: 1px solid #e3e9f4;
        padding-left: 22px;
      }
      .hero-score2 {
        font-size: 2rem;
        font-weight: 800;
        line-height: 1.2;
      }
      .quadrant {
        margin-top: 10px;
        font-size: 0.84rem;
        font-weight: 600;
        line-height: 1.4;
      }
      .hero-chart {
        flex: 1 1 380px;
        min-height: 170px;
        position: relative;
      }
      .hero-chart canvas {
        max-height: 170px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Market Mood Tracker</h1>
      <div class="sub" id="page-sub">
        Measures crowd sentiment and positioning — manic euphoria at the top of the scale, capitulation panic at the bottom.
        Pair this gauge with fundamentals.
      </div>
      <div class="page-tabs" aria-label="Pages">
        <button type="button" data-page="euphoria">Euphoria–Panic Index</button>
        <button type="button" data-page="disconnect">Fundamental Disconnect Index</button>
        <button type="button" data-page="crypto">Crypto Regime</button>
      </div>
      <div class="toolbar">
        <div id="status" class="sub">Loading...</div>
        <div class="range-toggle" aria-label="Chart date range">
          <button type="button" data-range="1w">1 w</button>
          <button type="button" data-range="1m">1 month</button>
          <button type="button" data-range="all">All</button>
        </div>
      </div>
      <div id="cards"></div>
      <div class="footer">API: <code>/latest</code> and <code>/metrics/{metric}</code></div>
    </div>

    <div id="quad-modal" class="quad-modal" hidden>
      <div class="quad-modal-close" aria-label="Close">&times;</div>
      <div id="quad-modal-body"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
      const cards = document.getElementById("cards");
      const status = document.getElementById("status");
      const rangeButtons = document.querySelectorAll("[data-range]");
      let chartInstances = {};
      let selectedRange = "1m";
      const allRangeStartDate = "2026-03-13";

      const rangeDays = {
        "1w": 7,
        "1m": 30,
        "all": null,
      };
      const thresholdPlugin = {
        id: "thresholdLines",
        afterDatasetsDraw(chart, args, options) {
          const thresholds = options.thresholds || [];
          if (!thresholds.length) return;

          const { ctx, chartArea, scales } = chart;
          const yScale = scales.y;
          if (!yScale) return;

          ctx.save();
          thresholds.forEach((threshold) => {
            const y = yScale.getPixelForValue(threshold.value);
            if (y < chartArea.top || y > chartArea.bottom) return;

            ctx.beginPath();
            ctx.moveTo(chartArea.left, y);
            ctx.lineTo(chartArea.right, y);
            ctx.lineWidth = 1;
            ctx.strokeStyle = threshold.color;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
          });
          ctx.restore();
        },
      };

      Chart.register(thresholdPlugin);

      function applyRange(rows) {
        if (!rows.length) return rows;

        if (selectedRange === "all") {
          const startTime = new Date(`${allRangeStartDate}T00:00:00`).getTime();
          return rows.filter((row) => {
            const rowTime = new Date(`${row.date}T00:00:00`).getTime();
            return rowTime >= startTime;
          });
        }

        const days = rangeDays[selectedRange];
        const latestTime = new Date(`${rows[rows.length - 1].date}T00:00:00`).getTime();
        const cutoffTime = latestTime - ((days - 1) * 24 * 60 * 60 * 1000);

        return rows.filter((row) => {
          const rowTime = new Date(`${row.date}T00:00:00`).getTime();
          return rowTime >= cutoffTime;
        });
      }

      function updateRangeButtons() {
        rangeButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.range === selectedRange);
        });
      }

      function hasNumber(value) {
        return Number.isFinite(Number(value));
      }

      function formatFixed(value, digits, suffix = "") {
        return hasNumber(value) ? `${Number(value).toFixed(digits)}${suffix}` : null;
      }

      function formatRounded(value, suffix = "") {
        return hasNumber(value) ? `${Math.round(Number(value))}${suffix}` : null;
      }

      const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      function lastDate(series) {
        return series && series.dates && series.dates.length ? series.dates[series.dates.length - 1] : null;
      }
      function asOfMonth(series) {
        const d = lastDate(series);
        if (!d) return "—";
        const [y, m] = d.split("-");
        return `${monthNames[Number(m) - 1]} ${y}`;
      }
      function asOfQuarter(series) {
        const d = lastDate(series);
        if (!d) return "—";
        const [y, m] = d.split("-");
        return `Q${Math.floor((Number(m) - 1) / 3) + 1} ${y}`;
      }

      async function fetchSeries(metric, field, opts = {}) {
        const r = await fetch(`/metrics/${metric}`);
        if (!r.ok) return { dates: [], values: [] };
        const rows = await r.json();
        // Monthly series (e.g. margin debt) ignore the daily range toggle
        const filteredRows = opts.lastN ? rows.slice(-opts.lastN) : applyRange(rows);
        return {
          dates: filteredRows.map(x => x.date),
          values: filteredRows.map((x) => { const v = Number(x[field]); return Number.isNaN(v) ? null : v; })
        };
      }

      async function fetchMetricHistory(metric, lastN) {
        const r = await fetch(`/metric_history/${metric}`);
        if (!r.ok) return { dates: [], values: [] };
        let rows = await r.json();
        if (lastN) rows = rows.slice(-lastN);
        return {
          dates: rows.map((x) => x.date),
          values: rows.map((x) => { const v = Number(x.value); return Number.isNaN(v) ? null : v; }),
        };
      }

      function createChart(canvasId, data, label, color = '#0b6bcb', thresholds = [], stepped = false) {
        const ctx = document.getElementById(canvasId);
        if (!ctx) return;
        
        // Destroy existing chart
        if (chartInstances[canvasId]) {
          chartInstances[canvasId].destroy();
        }

        if (!data.values.length) {
          ctx.parentElement.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">No historical data yet</div>';
          return;
        }

        const yValues = [
          ...data.values.filter((value) => Number.isFinite(value)),
          ...thresholds.map((threshold) => threshold.value),
        ];
        const yMin = Math.min(...yValues);
        const yMax = Math.max(...yValues);
        const yPadding = yMin === yMax ? Math.abs(yMin || 1) * 0.1 : (yMax - yMin) * 0.08;

        chartInstances[canvasId] = new Chart(ctx, {
          type: 'line',
          data: {
            labels: data.dates,
            datasets: [{
              label: label,
              data: data.values,
              borderColor: color,
              backgroundColor: color + '20',
              tension: stepped ? 0 : 0.3,
              stepped: stepped ? 'before' : false,
              fill: true,
              pointRadius: 2,
              pointHoverRadius: 4,
              spanGaps: false,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              thresholdLines: { thresholds },
              tooltip: {
                mode: 'index',
                intersect: false,
              }
            },
            scales: {
              x: {
                display: false,
              },
              y: {
                display: true,
                min: yMin - yPadding,
                max: yMax + yPadding,
                grid: { color: '#f0f0f0' },
                ticks: { font: { size: 10 } }
              }
            },
            interaction: {
              mode: 'nearest',
              axis: 'x',
              intersect: false
            }
          }
        });
      }

      function compositeStatus(score) {
        if (!hasNumber(score)) return { label: "No data", color: "#999999" };
        if (score < 15) return { label: "Capitulation — historically a long-term entry zone", color: "#2563eb" };
        if (score < 30) return { label: "Fearful", color: "#0e7490" };
        if (score < 50) return { label: "Neutral", color: "#1d8f4f" };
        if (score < 65) return { label: "Heating up", color: "#d97706" };
        if (score < 80) return { label: "Euphoric", color: "#c73030" };
        return { label: "Manic extreme", color: "#7f1d1d" };
      }

      function disconnectStatus(score) {
        if (!hasNumber(score)) return { label: "No data", color: "#999999" };
        if (score < 25) return { label: "Anchored to fundamentals", color: "#1d8f4f" };
        if (score < 50) return { label: "Full price", color: "#ca8a04" };
        if (score < 70) return { label: "Stretched", color: "#d97706" };
        return { label: "Disconnected", color: "#c73030" };
      }

      const pageSubs = {
        euphoria:
          "Measures crowd sentiment and positioning — manic euphoria at the top of the scale, capitulation panic at the bottom. Pair this gauge with fundamentals.",
        disconnect:
          "The second axis: is the price backed by earnings? Sentiment can be euphoric for good reason — this index measures how far prices have detached from the cash flows underneath.",
        crypto:
          "BTC/ETH trend regime — hold while the daily close is above its 120-day MA, cash below (walk-forward validated). Signals execute at the next daily close; this page is the live state of that rule.",
      };
      let currentPage = location.hash === "#disconnect" ? "disconnect" : (location.hash === "#crypto" ? "crypto" : "euphoria");
      const pageButtons = document.querySelectorAll("[data-page]");
      const pageSub = document.getElementById("page-sub");

      function updatePageButtons() {
        pageButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.page === currentPage);
        });
        pageSub.textContent = pageSubs[currentPage];
      }

      let lastQuadScores = null;
      function quadrantHtml(e, d) {
        if (!hasNumber(e) || !hasNumber(d)) return "";
        lastQuadScores = { e, d };
        const cells = [
          { label: "Expensive<br>but unloved", active: e < 60 && d >= 60, calm: false },
          { label: "Bubble<br>conditions", active: e >= 60 && d >= 60, calm: false },
          { label: "Healthy", active: e < 60 && d < 60, calm: true },
          { label: "Hot but<br>earning it", active: e >= 60 && d < 60, calm: false },
        ];
        const x = Math.min(97, Math.max(3, e));
        const y = Math.min(97, Math.max(3, d));
        return `
          <div class="quad-wrap">
            <div class="quad-row">
              <div class="quad-axis quad-y">Fundamental Disconnect →</div>
              <div class="quad">
                ${cells
                  .map((c) => `<div class="quad-cell${c.active ? " active" : ""}${c.active && c.calm ? " calm" : ""}">${c.label}</div>`)
                  .join("")}
                <div class="quad-dot" style="left:${x}%; bottom:${y}%" title="Euphoria ${Math.round(e)} / Disconnect ${Math.round(d)}"></div>
                <div class="quad-expand">⤢ expand</div>
              </div>
            </div>
            <div class="quad-axis">Euphoria →</div>
          </div>`;
      }

      const episodeColors = ["#c73030", "#d97706", "#2563eb", "#9333ea"];
      const sectorNames = {
        XLK: "Technology", XLF: "Financials", XLE: "Energy", XLV: "Health Care",
        XLY: "Consumer Discretionary", XLP: "Consumer Staples", XLI: "Industrials",
        XLB: "Materials", XLU: "Utilities", XLRE: "Real Estate", XLC: "Communication Services",
      };
      const sectionOrder = [
        "Price & Valuation",
        "Speculation & Sentiment",
        "Credit & Liquidity",
        "Volatility & Complacency",
        "Fundamental Disconnect",
      ];
      const sectionMeta = {
        "Fundamental Disconnect": "separate index — is the price backed by earnings?",
      };

      function createDualChart(canvasId, dates, seriesA, seriesB) {
        const ctx = document.getElementById(canvasId);
        if (!ctx) return;
        if (chartInstances[canvasId]) chartInstances[canvasId].destroy();
        if (!dates.length) {
          ctx.parentElement.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">No historical data yet</div>';
          return;
        }
        chartInstances[canvasId] = new Chart(ctx, {
          type: "line",
          data: {
            labels: dates,
            datasets: [
              { label: seriesA.label, data: seriesA.values, borderColor: "#0b6bcb",
                backgroundColor: "#0b6bcb10", tension: 0.3, fill: true, pointRadius: 0, pointHoverRadius: 3 },
              { label: seriesB.label, data: seriesB.values, borderColor: "#d97706",
                borderDash: [6, 4], tension: 0.3, fill: false, pointRadius: 0, pointHoverRadius: 3 },
            ],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: true, labels: { boxWidth: 18, font: { size: 10 } } },
                       tooltip: { mode: "index", intersect: false } },
            scales: { x: { display: false }, y: { display: true, grid: { color: "#f0f0f0" }, ticks: { font: { size: 10 } } } },
            interaction: { mode: "nearest", axis: "x", intersect: false },
          },
        });
      }

      const cryptoNames = { "BTC-USD": "Bitcoin", "ETH-USD": "Ethereum" };
      function cryptoRange(rows) { return selectedRange === "all" ? rows : applyRange(rows); }
      async function renderCrypto() {
        const latest = await (await fetch("/crypto")).json();
        const assets = Object.keys(cryptoNames);
        const histories = {};
        for (const a of assets) {
          const r = await fetch(`/crypto/history/${a}`);
          histories[a] = r.ok ? await r.json() : [];
        }
        Object.keys(chartInstances).forEach((id) => { chartInstances[id].destroy(); delete chartInstances[id]; });

        const strategyNote = `
          <div class="card" style="margin-bottom:16px;">
            <div class="card-head"><div class="card-title">The rule (walk-forward validated)</div></div>
            <div class="meta" style="line-height:1.6;">

            </div>`;

          const cardHtml = (x) => {
            const sig = signalsByKey[x.key];
            const chip = sig
              ? `<span class="chip">weight ${sig.weight}% · heat ${sig.subscore === null ? "—" : Math.round(sig.subscore)}</span>`
              : "";
            return `
              <div class="card">
                <div class="card-head">
                  <div class="card-title">${x.title}${x.desc ? `<span class="info-icon" tabindex="0" aria-label="${x.title} description">i<span class="tip">${x.desc}</span></span>` : ''}</div>
                  ${chip}
                </div>
                <div class="value ${x.cls}">${x.value}</div>
                <div class="meta">${x.meta}</div>
                <div class="line">
                  <canvas id="chart-${x.key}"></canvas>
                </div>
              </div>`;
          };

          const visibleSections = currentPage === "euphoria"
            ? sectionOrder.filter((s) => s !== "Fundamental Disconnect")
            : ["Fundamental Disconnect"];
          const hero = currentPage === "euphoria" ? heroEuphoria : heroDisconnect;

          // Drop chart instances for canvases removed by the page switch
          Object.keys(chartInstances).forEach((id) => {
            chartInstances[id].destroy();
            delete chartInstances[id];
          });

          cards.innerHTML = hero + visibleSections
            .map((section) => {
              const sectionItems = items
                .filter((x) => x.section === section)
                .sort((a, b) => a.rank - b.rank);
              const sectionWeight = sectionItems.reduce((sum, x) => sum + (signalsByKey[x.key]?.weight || 0), 0);
              const sub = sectionMeta[section] || `${sectionWeight}% of euphoria index · ranked most → least important`;
              return `
                <div class="section-title">
                  <h2>${section}</h2>
                  <div class="sub">${sub}</div>
                </div>
                <div class="grid">${sectionItems.map(cardHtml).join("")}</div>`;
            })
            .join("");

          // Create charts after DOM is ready
          if (currentPage === "euphoria") {
            createChart(
              "chart-composite",
              { dates: compositeHistory.map((x) => x.date), values: compositeHistory.map((x) => Number(x.score)) },
              "Euphoria–Panic Index",
              "#0b6bcb",
              episodeLines
            );
          }
          items
            .filter((item) => visibleSections.includes(item.section))
            .forEach((item) => {
              createChart(`chart-${item.key}`, item.chartData, item.title, item.chartColor || '#0b6bcb', item.thresholds || [], item.stepped || false);
            });

          status.textContent = `Last refresh: ${new Date().toLocaleString()}`;
        } catch (err) {
          console.error("render failed:", err);
          status.textContent = "Data temporarily unavailable — retrying automatically.";
        }
      }

      rangeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          selectedRange = button.dataset.range;
          updateRangeButtons();
          render();
        });
      });

      const quadModal = document.getElementById("quad-modal");
      const quadModalBody = document.getElementById("quad-modal-body");

      function closeQuadModal() {
        quadModal.hidden = true;
        quadModalBody.innerHTML = "";
      }

      cards.addEventListener("click", (event) => {
        if (event.target.closest(".quad") && lastQuadScores) {
          quadModalBody.innerHTML = quadrantHtml(lastQuadScores.e, lastQuadScores.d);
          quadModal.hidden = false;
        }
      });
      quadModal.addEventListener("click", (event) => {
        if (event.target === quadModal || event.target.closest(".quad-modal-close")) {
          closeQuadModal();
        }
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !quadModal.hidden) closeQuadModal();
      });

      pageButtons.forEach((button) => {
        button.addEventListener("click", () => {
          currentPage = button.dataset.page;
          location.hash = currentPage === "disconnect" ? "#disconnect" : (currentPage === "crypto" ? "#crypto" : "#euphoria");
          updatePageButtons();
          render();
        });
      });

      window.addEventListener("hashchange", () => {
        const page = location.hash === "#disconnect" ? "disconnect" : (location.hash === "#crypto" ? "crypto" : "euphoria");
        if (page !== currentPage) {
          currentPage = page;
          updatePageButtons();
          render();
        }
      });

      updateRangeButtons();
      updatePageButtons();
      render();
      setInterval(render, 30000);
    </script>
  </body>
</html>
